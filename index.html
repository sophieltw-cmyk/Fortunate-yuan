// ── 工具函數 ───────────────────────────────────────
function toStr(q){const l=Math.floor(q/10),r=q%10;if(l===0)return`${r}錢`;if(r===0)return`${l}兩`;return`${l}兩${r}錢`;}
function toKey(q){return`${Math.floor(q/10)}.${q%10}`;}

// ── 狀態 ───────────────────────────────────────────
let gender='female', selSC=null;

// ── 初始化下拉選單 ──────────────────────────────────
(function init(){
  const yr=document.getElementById('sel-year');
  for(let y=1950;y<=2029;y++){const o=document.createElement('option');o.value=y;o.textContent=y+'年';yr.appendChild(o);}
  yr.value=1980; // 預設1980，非特定人

  const mo=document.getElementById('sel-month');
  for(let m=1;m<=12;m++){const o=document.createElement('option');o.value=m;o.textContent=m+'月';mo.appendChild(o);}
  mo.value=1;

  const dy=document.getElementById('sel-day');
  for(let d=1;d<=30;d++){const o=document.createElement('option');o.value=d;o.textContent=d+'日';dy.appendChild(o);}
  dy.value=1;

  // 時辰格
  const grid=document.getElementById('shichen-grid');
  SHICHEN.forEach(s=>{
    const b=document.createElement('button');
    b.className='sc-btn';
    b.dataset.dz=s.d;
    b.innerHTML=`<div class="sc-name">${s.n}</div><div class="sc-range">${s.r}</div>`;
    b.onclick=()=>selectSC(s.d);
    grid.appendChild(b);
  });
  // 預設不選任何時辰
})();

function setGender(g){
  gender=g;
  document.getElementById('btn-f').className='gender-btn'+(g==='female'?' active-f':'');
  document.getElementById('btn-m').className='gender-btn'+(g==='male'?' active-m':'');
}

function selectSC(dz){
  selSC=dz;
  document.querySelectorAll('.sc-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.dz===dz);
  });
}

function showErr(msg){
  const el=document.getElementById('err-msg');
  el.textContent=msg; el.style.display=msg?'block':'none';
}

function calc(){
  showErr('');
  if(!selSC){showErr('請選擇出生時辰');return;}
  const y=+document.getElementById('sel-year').value;
  const m=+document.getElementById('sel-month').value;
  const d=+document.getElementById('sel-day').value;
  const gz=getGZ(y);
  if(!gz){showErr('年份超出範圍（1950–2029）');return;}
  const yw=YW[gz],mw=MW[m],dw=DW[d],hw=HW[selSC];
  if(yw==null||!mw||!dw||!hw){showErr('資料錯誤，請確認輸入');return;}
  const total=yw+mw+dw+hw;
  const key=toKey(total);
  const poem=(gender==='male'?MALE:FEMALE)[key]||'（查無對應詩文）';

  // 顯示結果
  document.getElementById('result-section').style.display='block';
  document.getElementById('r-meta').textContent=`${gz}年　農曆${m}月${d}日　${selSC}時`;
  document.getElementById('r-total').textContent=toStr(total);
  document.getElementById('r-poem').textContent=poem;

  const det=document.getElementById('r-detail');
  det.innerHTML=[
    {l:`年份（${gz}）`,v:yw},{l:`農曆${m}月`,v:mw},{l:`農曆${d}日`,v:dw},{l:`${selSC}時`,v:hw}
  ].map(({l,v})=>`<div class="detail-row"><span class="detail-lbl">${l}</span><span class="detail-val">${toStr(v)}</span></div>`).join('')
  +`<div class="detail-row"><span class="detail-total-lbl">合計</span><span class="detail-total-val">${toStr(total)}</span></div>`;

  document.getElementById('r-expl').innerHTML='<div class="loading"><div class="spin">⏳</div><p>命理師解讀中...</p></div>';
  document.getElementById('result-section').scrollIntoView({behavior:'smooth'});

  // 呼叫 API
  const gTxt=gender==='male'?'男性':'女性';
  const prompt=`你是精通袁天罡稱骨算命的命理師，用溫暖正向現代白話語氣解說。\n\n命主：${gTxt}，${gz}年，農曆${m}月${d}日，${selSC}時，骨重${toStr(total)}（${key}兩）\n原文：「${poem}」\n\n請依4段回答（各60–80字）：\n1.【整體命格】此骨重代表什麼樣的人生基調？\n2.【事業財運】現代職場特質與財富緣分？\n3.【感情人際】感情、家庭、人際關係走向？\n4.【晚年建議】整體走勢與給命主的一句鼓勵。\n\n語氣正向，避免恐嚇，強調後天努力可改變命運。`;

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
  }).then(r=>r.json()).then(data=>{
    const txt=data.content?.find(b=>b.type==='text')?.text||'解說生成失敗，請稍後再試。';
    document.getElementById('r-expl').innerHTML=`<div class="expl">${txt.replace(/</g,'&lt;')}</div>`;
  }).catch(()=>{
    document.getElementById('r-expl').innerHTML='<div class="expl">網路錯誤，無法取得解說。</div>';
  });
}
</script>
